server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # This ensures your SVG is served with the correct header
    location ~* \.svg$ {
        root /usr/share/nginx/html;
        add_header Content-Type image/svg+xml;
    }
}
